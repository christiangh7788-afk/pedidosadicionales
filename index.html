<style>
  :root {
    --bg: #F5F7FA; --surface: #FFFFFF; --primary: #0B4F6C; --primary-dark: #073B52;
    --accent: #E8871E; --success: #1E8A5F; --danger: #C74B3F;
    --text: #1A2733; --text-muted: #63748A; --border: #E1E6EB;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--text);
  }
  #root { min-height: 100vh; }
  .pcx-shell { max-width: 980px; margin: 0 auto; padding: 16px; }
  .pcx-topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--primary); color: white; border-radius: 14px; margin-bottom: 16px; }
  .pcx-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
  .pcx-brand-sub { font-size: 11.5px; opacity: 0.8; font-weight: 500; }
  .pcx-iconbtn { background: rgba(255,255,255,0.12); border: none; color: white; width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
  .pcx-iconbtn:hover { background: rgba(255,255,255,0.22); }
  .pcx-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .pcx-h1 { font-size: 20px; font-weight: 800; margin: 0 0 4px 0; }
  .pcx-h2 { font-size: 15px; font-weight: 700; margin: 0 0 10px 0; }
  .pcx-muted { color: var(--text-muted); font-size: 13px; }
  .pcx-btn { border: none; border-radius: 10px; padding: 11px 16px; font-weight: 700; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
  .pcx-btn:hover { filter: brightness(0.95); }
  .pcx-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .pcx-btn-primary { background: var(--primary); color: white; }
  .pcx-btn-accent { background: var(--accent); color: white; }
  .pcx-btn-ghost { background: transparent; color: var(--primary); border: 1.5px solid var(--border); }
  .pcx-btn-danger { background: transparent; color: var(--danger); border: 1.5px solid #F2D3D0; }
  .pcx-btn-block { width: 100%; }
  .pcx-input, .pcx-select { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 14px; font-family: inherit; background: white; color: var(--text); }
  .pcx-input:focus, .pcx-select:focus { outline: none; border-color: var(--primary); }
  .pcx-role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) { .pcx-role-grid { grid-template-columns: 1fr; } }
  .pcx-role-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 24px 18px; text-align: center; cursor: pointer; }
  .pcx-role-card:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(11,79,108,0.08); }
  .pcx-role-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px auto; font-size: 24px; }
  .pcx-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; }
  .pcx-tab { padding: 9px 14px; border-radius: 10px; font-size: 13.5px; font-weight: 700; cursor: pointer; white-space: nowrap; border: 1.5px solid var(--border); background: white; color: var(--text-muted); }
  .pcx-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
  .pcx-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .pcx-search-row { position: relative; margin-bottom: 12px; }
  .pcx-search-row span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  .pcx-search-row input { padding-left: 34px; }
  .pcx-item-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 4px; border-bottom: 1px solid var(--border); }
  .pcx-item-row:last-child { border-bottom: none; }
  .pcx-item-name { font-weight: 700; font-size: 13.5px; }
  .pcx-item-meta { font-size: 12px; color: var(--text-muted); }
  .pcx-qtybox { display: flex; align-items: center; gap: 8px; }
  .pcx-qtybox button { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid var(--border); background: white; cursor: pointer; }
  .pcx-qtybox span { min-width: 24px; text-align: center; font-weight: 700; font-size: 13.5px; }
  .pcx-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pcx-table th { text-align: left; padding: 8px 10px; background: #F0F3F6; color: var(--text-muted); font-weight: 700; font-size: 11.5px; text-transform: uppercase; }
  .pcx-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
  .pcx-table-wrap { overflow-x: auto; }
  .pcx-folio-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .pcx-folio-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; cursor: pointer; }
  .pcx-folio-id { font-weight: 800; font-size: 14.5px; }
  .pcx-empty { text-align: center; padding: 40px 16px; color: var(--text-muted); }
  .pcx-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 560px) { .pcx-grid-2 { grid-template-columns: 1fr; } }
  .pcx-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 600; z-index: 999; box-shadow: 0 6px 20px rgba(0,0,0,0.2); max-width: 90%; }
  .pcx-stat { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .pcx-stat-num { font-size: 22px; font-weight: 800; color: var(--primary); }
  .pcx-stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .pcx-link { color: var(--primary); font-weight: 700; font-size: 13px; cursor: pointer; text-decoration: underline; }
  .pcx-bars { display: flex; align-items: flex-end; gap: 10px; height: 220px; padding: 10px 4px 0 4px; overflow-x: auto; }
  .pcx-bar-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-width: 46px; height: 100%; }
  .pcx-bar { width: 30px; background: var(--primary); border-radius: 6px 6px 0 0; }
  .pcx-bar-val { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
  .pcx-bar-lbl { font-size: 10px; color: var(--text-muted); margin-top: 6px; text-align: center; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 8% 0%, rgba(8,126,155,.10), transparent 28%),
    radial-gradient(circle at 96% 8%, rgba(245,124,34,.09), transparent 24%),
    linear-gradient(180deg, #F8FBFC 0%, #EEF4F7 100%);
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,.52) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.52) 1px, transparent 1px);
  background-size: 42px 42px;
  opacity: .28;
  z-index: -1;
}

button, input, select { font: inherit; }
button, .pcx-role-card, .pcx-tab, .pcx-link { -webkit-tap-highlight-color: transparent; }
button:focus-visible, input:focus-visible, select:focus-visible, .pcx-role-card:focus-visible, .pcx-tab:focus-visible {
  outline: none;
  box-shadow: var(--ring);
}

.pcx-shell {
  max-width: 1180px;
  margin: 0 auto;
  padding: 22px clamp(14px, 3vw, 28px) 42px;
}

.pcx-topbar {
  position: sticky;
  top: 12px;
  z-index: 50;
  padding: 13px 16px;
  margin-bottom: 18px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(6,100,126,.96), rgba(8,126,155,.94));
  border: 1px solid rgba(255,255,255,.18);
  box-shadow: 0 16px 38px rgba(7,91,115,.20);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}
.pcx-brand { gap: 11px; font-size: 15px; letter-spacing: .1px; }
.pcx-brand::before {
  content: "n";
  width: 35px;
  height: 35px;
  display: inline-grid;
  place-items: center;
  border-radius: 11px;
  background: white;
  color: var(--primary);
  font-size: 22px;
  font-style: italic;
  font-weight: 950;
  box-shadow: inset 0 0 0 1px rgba(8,126,155,.10), 0 6px 14px rgba(0,0,0,.12);
}
.pcx-brand-sub { font-size: 12px; opacity: .82; margin-top: 2px; }
.pcx-iconbtn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
}
.pcx-iconbtn:hover { transform: translateY(-1px); background: rgba(255,255,255,.20); }

.pcx-card {
  background: var(--surface);
  border: 1px solid rgba(214,229,235,.95);
  border-radius: 18px;
  padding: clamp(16px, 2.3vw, 22px);
  margin-bottom: 15px;
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.pcx-h1 { font-size: clamp(22px, 3vw, 29px); letter-spacing: -.55px; }
.pcx-h2 { font-size: 16px; letter-spacing: -.15px; }
.pcx-muted { line-height: 1.45; }

.pcx-btn {
  min-height: 44px;
  border-radius: 12px;
  padding: 11px 17px;
  transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
  box-shadow: 0 5px 14px rgba(17,67,84,.06);
}
.pcx-btn:hover { transform: translateY(-1px); filter: none; box-shadow: 0 9px 20px rgba(17,67,84,.11); }
.pcx-btn:active { transform: translateY(0) scale(.99); }
.pcx-btn-primary { background: linear-gradient(135deg, var(--primary), #0694B5); }
.pcx-btn-accent { background: linear-gradient(135deg, var(--accent), #FF963F); }
.pcx-btn-ghost { background: rgba(255,255,255,.76); border-color: #D4E4EA; }
.pcx-btn-danger { background: #FFF8F7; }

.pcx-input, .pcx-select {
  min-height: 46px;
  border-radius: 12px;
  border-color: #D4E3E9;
  background: rgba(255,255,255,.96);
  transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
}
.pcx-input:hover, .pcx-select:hover { border-color: #B8D1DB; }
.pcx-input:focus, .pcx-select:focus { border-color: var(--primary); box-shadow: var(--ring); background: white; }

/* Portada */
.pcx-landing { display: grid; gap: 16px; }
.pcx-landing-hero {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  min-height: 310px;
  display: grid;
  align-items: end;
  padding: clamp(24px, 5vw, 48px);
  border-radius: 26px;
  color: white;
  background: linear-gradient(135deg, #075B73 0%, #087E9B 60%, #0A91AF 100%);
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(255,255,255,.18);
}
.pcx-landing-hero::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -2;
  background-image: var(--store-watermark);
  background-size: cover;
  background-position: center 52%;
  opacity: .34;
  filter: saturate(.78) contrast(1.04);
  transform: scale(1.03);
}
.pcx-landing-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(90deg, rgba(5,62,80,.94) 0%, rgba(5,82,105,.78) 46%, rgba(8,126,155,.42) 100%),
    linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.26));
}
.pcx-hero-content { max-width: 670px; }
.pcx-hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 11px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,.24);
  border-radius: 999px;
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(9px);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .2px;
}
.pcx-hero-title {
  margin: 0;
  max-width: 620px;
  font-size: clamp(31px, 5vw, 50px);
  line-height: 1.02;
  letter-spacing: -1.7px;
  text-shadow: 0 8px 28px rgba(0,0,0,.18);
}
.pcx-hero-copy {
  margin: 14px 0 0;
  max-width: 620px;
  color: rgba(255,255,255,.88);
  font-size: clamp(14px, 1.8vw, 17px);
  line-height: 1.55;
}
.pcx-hero-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.pcx-hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 11px;
  border-radius: 999px;
  background: rgba(255,255,255,.14);
  border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.94);
  font-size: 12px;
  font-weight: 750;
}
.pcx-role-section {
  padding: clamp(18px, 3vw, 28px);
  border: 1px solid var(--border);
  border-radius: 22px;
  background: rgba(255,255,255,.78);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(14px);
}
.pcx-role-section-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 16px;
}
.pcx-role-grid { gap: 14px; }
.pcx-role-card {
  position: relative;
  overflow: hidden;
  min-height: 185px;
  padding: 24px;
  text-align: left;
  border-radius: 18px;
  border-color: #D8E7EC;
  box-shadow: 0 8px 22px rgba(17,67,84,.06);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
}
.pcx-role-card::after {
  content: "→";
  position: absolute;
  right: 20px;
  bottom: 18px;
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--primary-soft);
  color: var(--primary);
  font-size: 18px;
  font-weight: 900;
  transition: transform .2s ease, background .2s ease, color .2s ease;
}
.pcx-role-card:hover {
  transform: translateY(-4px);
  border-color: rgba(8,126,155,.45);
  box-shadow: 0 18px 38px rgba(17,67,84,.13);
  background: white;
}
.pcx-role-card:hover::after { transform: translateX(3px); background: var(--primary); color: white; }
.pcx-role-icon {
  width: 54px;
  height: 54px;
  margin: 0 0 16px 0;
  border-radius: 16px;
  font-size: 25px;
}
.pcx-role-title { font-weight: 850; font-size: 17px; letter-spacing: -.2px; }
.pcx-role-copy { max-width: 260px; margin-top: 6px; padding-right: 28px; }

.pcx-tabs {
  gap: 8px;
  padding: 5px;
  border-radius: 14px;
  background: rgba(225,237,242,.72);
  border: 1px solid #D7E7EC;
}
.pcx-tab {
  border: none;
  background: transparent;
  border-radius: 10px;
  padding: 10px 15px;
  transition: background .18s ease, color .18s ease, box-shadow .18s ease;
}
.pcx-tab.active { background: white; color: var(--primary-dark); box-shadow: 0 5px 14px rgba(17,67,84,.10); }

.pcx-item-row {
  padding: 13px 8px;
  border-bottom-color: #E5EEF2;
  border-radius: 10px;
  transition: background .16s ease, transform .16s ease;
}
.pcx-item-row:hover { background: #F7FBFC; }
.pcx-qtybox button { min-width: 32px; min-height: 32px; border-radius: 10px; font-size: 17px; }

.pcx-table { border-collapse: separate; border-spacing: 0; }
.pcx-table th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: #EEF5F7;
  color: #516C78;
  letter-spacing: .35px;
}
.pcx-table th:first-child { border-radius: 10px 0 0 0; }
.pcx-table th:last-child { border-radius: 0 10px 0 0; }
.pcx-table tbody tr { transition: background .15s ease; }
.pcx-table tbody tr:hover { background: #F6FAFB; }

.pcx-folio-card {
  background: rgba(255,255,255,.92);
  border-radius: 16px;
  box-shadow: 0 7px 20px rgba(17,67,84,.06);
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.pcx-folio-card:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(17,67,84,.10); border-color: #C7DDE5; }
.pcx-badge { border: 1px solid rgba(0,0,0,.04); }
.pcx-stat {
  position: relative;
  overflow: hidden;
  padding: 18px;
  border-radius: 16px;
  box-shadow: var(--shadow-sm);
}
.pcx-stat::after {
  content: "";
  position: absolute;
  width: 72px;
  height: 72px;
  right: -24px;
  top: -24px;
  border-radius: 50%;
  background: rgba(8,126,155,.08);
}
.pcx-stat-num { font-size: 27px; letter-spacing: -.8px; }
.pcx-toast {
  bottom: 24px;
  border-radius: 14px;
  background: rgba(22,48,60,.96);
  box-shadow: 0 18px 40px rgba(0,0,0,.22);
  backdrop-filter: blur(12px);
}

@keyframes pcxFadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.pcx-card, .pcx-role-card, .pcx-folio-card { animation: pcxFadeUp .34s ease both; }

@media (max-width: 700px) {
  .pcx-shell { padding-top: 10px; }
  .pcx-topbar { top: 7px; border-radius: 15px; }
  .pcx-landing-hero { min-height: 350px; padding: 24px 20px; border-radius: 22px; }
  .pcx-landing-hero::before { background-position: 58% center; opacity: .30; }
  .pcx-landing-hero::after { background: linear-gradient(180deg, rgba(5,62,80,.42), rgba(5,62,80,.94) 72%); }
  .pcx-hero-title { letter-spacing: -1.15px; }
  .pcx-role-section-head { align-items: flex-start; flex-direction: column; }
  .pcx-role-card { min-height: 165px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
}

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

const ADMIN_PIN = "NETO-2026"; // Cambia este código si quieres otro PIN de administrador
const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbzHbJIAE5w6tiAss-NlSHeohk7Vy-Scd1anRAn7bDoYjzcNSf7bgq2phm4L5Qz4JRVK/exec"; // URL fija del Apps Script, ya no hace falta capturarla

const ESTATUS = ["Pendiente", "Confirmado", "En tránsito", "Entregado", "Cancelado"];
const ESTATUS_STYLE = {
  "Pendiente":   { bg: "#FFF3E0", fg: "#B5650C", icon: "⏳" },
  "Confirmado":  { bg: "#E6F4EC", fg: "#1E8A5F", icon: "✅" },
  "En tránsito": { bg: "#E8F0FB", fg: "#0B4F6C", icon: "🚚" },
  "Entregado":   { bg: "#EAF7EE", fg: "#1E8A5F", icon: "✅" },
  "Cancelado":   { bg: "#FBEAEA", fg: "#C74B3F", icon: "❌" },
};

function Toast({ message, onClose }) {
  useEffect(() => { if (!message) return; const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, [message]);
  if (!message) return null;
  return <div className="pcx-toast">⚠️ {message}</div>;
}

function StatusBadge({ estatus }) {
  const s = ESTATUS_STYLE[estatus] || ESTATUS_STYLE["Pendiente"];
  return <span className="pcx-badge" style={{ background: s.bg, color: s.fg }}>{s.icon} {estatus}</span>;
}

function App() {
  const [apiUrl, setApiUrl] = useState(localStorage.getItem("cedis_api_url") || DEFAULT_API_URL);
  const [apiUrlInput, setApiUrlInput] = useState(localStorage.getItem("cedis_api_url") || DEFAULT_API_URL);
  const [showConfig, setShowConfig] = useState(false);
  const [role, setRole] = useState(null);
  const [toast, setToast] = useState("");

  const notify = useCallback((msg) => setToast(msg), []);

  const saveApiUrl = (url) => {
    setApiUrl(url);
    localStorage.setItem("cedis_api_url", url);
  };

  const call = useCallback(async (params) => {
    if (!apiUrl) throw new Error("Primero configura la URL del sistema (ícono de engranaje).");
    const url = apiUrl + "?" + new URLSearchParams(params).toString();
    const res = await fetch(url);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    return data;
  }, [apiUrl]);

  const post = useCallback(async (body) => {
    if (!apiUrl) throw new Error("Primero configura la URL del sistema (ícono de engranaje).");
    const res = await fetch(apiUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);
    return data;
  }, [apiUrl]);

  return (
    <div className="pcx-shell">
      <div className="pcx-topbar">
        <div>
          <div className="pcx-brand">CEDIS Veracruz</div>
          <div className="pcx-brand-sub">Pedidos · Existencias · Seguimiento</div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {role && <button className="pcx-iconbtn" onClick={() => setRole(null)} title="Salir">🚪</button>}
          <button className="pcx-iconbtn" onClick={() => setShowConfig(true)} title="Configuración">⚙️</button>
        </div>
      </div>

      {showConfig && (
        <div className="pcx-card" style={{ borderColor: "var(--primary)" }}>
          <div className="pcx-h2">Configuración del sistema</div>
          <p className="pcx-muted" style={{ marginBottom: 10 }}>Pega la URL de tu Google Apps Script (Web App), termina en /exec. Se guarda en este navegador.</p>
          <input className="pcx-input" placeholder="https://script.google.com/macros/s/AKfycb.../exec"
            value={apiUrlInput} onChange={(e) => setApiUrlInput(e.target.value)} style={{ marginBottom: 10 }} />
          <div style={{ display: "flex", gap: 8 }}>
            <button className="pcx-btn pcx-btn-primary" disabled={!apiUrlInput.trim()}
              onClick={() => { saveApiUrl(apiUrlInput.trim()); setShowConfig(false); notify("URL guardada"); }}>Guardar</button>
            {apiUrl && <button className="pcx-btn pcx-btn-ghost" onClick={() => setShowConfig(false)}>Cancelar</button>}
          </div>
        </div>
      )}

      {!apiUrl && !showConfig && (
        <div className="pcx-card" style={{ borderColor: "#F2D9B8", background: "#FFF8EF" }}>
          <div style={{ fontWeight: 700, fontSize: 13.5 }}>⚠️ Falta configurar el sistema</div>
          <div className="pcx-muted">Toca ⚙️ arriba y pega la URL de tu Apps Script.</div>
        </div>
      )}

      {!role && apiUrl && !showConfig && <RoleSelect onSelect={setRole} />}
      {role === "gerente" && <GerenteFlow call={call} post={post} notify={notify} onExit={() => setRole(null)} />}
      {role === "admin" && <AdminFlow call={call} post={post} notify={notify} onExit={() => setRole(null)} />}

      <Toast message={toast} onClose={() => setToast("")} />
    </div>
  );
}

function RoleSelect({ onSelect }) {
  const [pin, setPin] = useState("");
  const [tryAdmin, setTryAdmin] = useState(false);
  const [err, setErr] = useState("");

  const submitAdmin = () => {
    if (pin === ADMIN_PIN) onSelect("admin");
    else setErr("Código incorrecto");
  };

  return (
    <div className="pcx-landing">
      <section className="pcx-landing-hero" aria-label="Portada del sistema CEDIS Veracruz">
        <div className="pcx-hero-content">
          <div className="pcx-hero-kicker">📦 Operación CEDIS · Veracruz</div>
          <h1 className="pcx-hero-title">Pedidos más simples. Operación más clara.</h1>
          <p className="pcx-hero-copy">
            Consulta existencias, solicita mercancía y da seguimiento a cada pedido desde una experiencia rápida, visual y fácil de usar.
          </p>
          <div className="pcx-hero-pills">
            <span className="pcx-hero-pill">✓ Consulta rápida</span>
            <span className="pcx-hero-pill">✓ Seguimiento por folio</span>
            <span className="pcx-hero-pill">✓ Diseño adaptable</span>
          </div>
        </div>
      </section>

      <section className="pcx-role-section">
        <div className="pcx-role-section-head">
          <div>
            <div className="pcx-h1" style={{ marginBottom: 4 }}>Elige cómo quieres entrar</div>
            <div className="pcx-muted">Selecciona tu perfil para mostrarte solo las herramientas que necesitas.</div>
          </div>
          <span className="pcx-badge" style={{ background: "var(--primary-soft)", color: "var(--primary-dark)" }}>● Sistema disponible</span>
        </div>

        <div className="pcx-role-grid">
          <div className="pcx-role-card" role="button" tabIndex="0"
            onClick={() => onSelect("gerente")}
            onKeyDown={(e) => (e.key === "Enter" || e.key === " ") && onSelect("gerente")}>
            <div className="pcx-role-icon" style={{ background: "#E7F6FA" }}>🏬</div>
            <div className="pcx-role-title">Gerente de tienda</div>
            <div className="pcx-muted pcx-role-copy">Consulta disponibilidad, arma tu pedido en cajas y revisa el estatus de tus folios.</div>
          </div>

          <div className="pcx-role-card" role="button" tabIndex="0"
            onClick={() => setTryAdmin(true)}
            onKeyDown={(e) => (e.key === "Enter" || e.key === " ") && setTryAdmin(true)}>
            <div className="pcx-role-icon" style={{ background: "#FFF0E5" }}>🛡️</div>
            <div className="pcx-role-title">Administrador</div>
            <div className="pcx-muted pcx-role-copy">Gestiona pedidos, actualiza estatus, confirma cantidades y carga existencias.</div>
          </div>
        </div>
      </section>

      {tryAdmin && (
        <div className="pcx-card" style={{ borderColor: "rgba(8,126,155,.40)", boxShadow: "var(--shadow-md)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
            <div className="pcx-role-icon" style={{ margin: 0, width: 44, height: 44, background: "var(--primary-soft)" }}>🔐</div>
            <div>
              <div className="pcx-h2" style={{ margin: 0 }}>Acceso de administrador</div>
              <div className="pcx-muted">Ingresa tu código para continuar.</div>
            </div>
          </div>
          <input className="pcx-input" autoFocus type="password" placeholder="Código de acceso" value={pin}
            onChange={(e) => { setPin(e.target.value); setErr(""); }}
            onKeyDown={(e) => e.key === "Enter" && submitAdmin()}
            style={{ marginBottom: 8 }} />
          {err && <div style={{ color: "var(--danger)", fontSize: 12.5, marginBottom: 8, fontWeight: 700 }}>⚠️ {err}</div>}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button className="pcx-btn pcx-btn-primary" onClick={submitAdmin}>Entrar al panel</button>
            <button className="pcx-btn pcx-btn-ghost" onClick={() => { setTryAdmin(false); setPin(""); setErr(""); }}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============= GERENTE ============= */

function GerenteFlow({ call, post, notify, onExit }) {
  const [eco, setEco] = useState(localStorage.getItem("cedis_last_eco") || "");
  const [tienda, setTienda] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const login = async () => {
    if (!eco.trim()) return;
    setLoading(true); setErr("");
    try {
      const t = await call({ action: "getTiendaByEco", eco: eco.trim() });
      setTienda(t);
      localStorage.setItem("cedis_last_eco", eco.trim());
    } catch (e) { setErr(e.message || "No se pudo validar el número económico"); }
    finally { setLoading(false); }
  };

  if (!tienda) {
    return (
      <div className="pcx-card">
        <div className="pcx-h2">Ingresa tu número económico (ECO)</div>
        <p className="pcx-muted" style={{ marginBottom: 12 }}>Con tu ECO identificamos automáticamente tu tienda.</p>
        <input className="pcx-input" placeholder="Ej. 2865" value={eco} onChange={(e) => setEco(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && login()} style={{ marginBottom: 10 }} />
        {err && <div style={{ color: "var(--danger)", fontSize: 12.5, marginBottom: 10 }}>{err}</div>}
        <div style={{ display: "flex", gap: 8 }}>
          <button className="pcx-btn pcx-btn-primary" onClick={login} disabled={loading}>{loading ? "Validando..." : "Entrar →"}</button>
          <button className="pcx-btn pcx-btn-ghost" onClick={onExit}>Cambiar perfil</button>
        </div>
      </div>
    );
  }
  return <GerenteDashboard tienda={tienda} call={call} post={post} notify={notify} onExit={() => setTienda(null)} />;
}

function GerenteDashboard({ tienda, call, post, notify, onExit }) {
  const [tab, setTab] = useState("catalogo");
  return (
    <div>
      <div className="pcx-card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ fontWeight: 800, fontSize: 15.5 }}>{tienda.Nombre_Tienda}</div>
          <div className="pcx-muted">ECO {tienda.ECO} · {tienda.Zona} · {tienda.Region}</div>
        </div>
        <span className="pcx-link" onClick={onExit}>Cambiar tienda</span>
      </div>
      <div className="pcx-tabs">
        <div className={`pcx-tab ${tab === "catalogo" ? "active" : ""}`} onClick={() => setTab("catalogo")}>Solicitar mercancía</div>
        <div className={`pcx-tab ${tab === "pedidos" ? "active" : ""}`} onClick={() => setTab("pedidos")}>Mis pedidos</div>
        <div className={`pcx-tab ${tab === "sinExistencia" ? "active" : ""}`} onClick={() => setTab("sinExistencia")}>Sin existencia en CEDIS</div>
      </div>
      {tab === "catalogo" && <CatalogoTab tienda={tienda} call={call} post={post} notify={notify} />}
      {tab === "pedidos" && <MisPedidosTab tienda={tienda} call={call} notify={notify} />}
      {tab === "sinExistencia" && <SinExistenciaTab call={call} notify={notify} />}
    </div>
  );
}

function CatalogoTab({ tienda, call, post, notify }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState("");
  const [cart, setCart] = useState({}); // codigo -> { item, cajas: string }
  const [sending, setSending] = useState(false);
  const [step, setStep] = useState("seleccion"); // 'seleccion' | 'resumen'
  const [confirmando, setConfirmando] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try { setItems(await call({ action: "getExistencias" })); }
    catch (e) { notify(e.message); } finally { setLoading(false); }
  }, [call, notify]);

  useEffect(() => { load(); }, [load]);

  const filtered = useMemo(() => {
    const enExistencia = items.filter(it => Number(it.Existencias) > 0);
    if (!q.trim()) return enExistencia;
    const s = q.trim().toLowerCase();
    return enExistencia.filter(it => String(it.Codigo).toLowerCase().includes(s) || String(it.Descripcion).toLowerCase().includes(s));
  }, [items, q]);

  const normaDe = (item) => { const n = Number(item.Norma_Empaque); return n > 0 ? n : 1; };
  const maxCajasDe = (item) => Math.floor((Number(item.Existencias) || 0) / normaDe(item));
  const cajasNum = (c) => Math.max(0, parseInt(c.cajas) || 0);

  const addToCart = (item) => {
    const max = maxCajasDe(item);
    if (max <= 0) { notify(`No hay suficiente existencia de "${item.Descripcion}" para completar ni una caja`); return; }
    setCart(prev => ({ ...prev, [item.Codigo]: { item, cajas: "1" } }));
  };
  const changeQty = (codigo, delta) => setCart(prev => {
    const cur = prev[codigo]; if (!cur) return prev;
    const max = maxCajasDe(cur.item);
    let next = Math.max(0, (parseInt(cur.cajas) || 0) + delta);
    if (next > max) { notify(`Solo puedes pedir ${max} ${max === 1 ? "caja" : "cajas"} de "${cur.item.Descripcion}" (existencia: ${cur.item.Existencias} piezas)`); next = max; }
    return { ...prev, [codigo]: { ...cur, cajas: String(next) } };
  });
  // Mientras el gerente escribe se permite dejar el campo vacío o borrar todo sin que
  // el artículo desaparezca del pedido; solo se limpia al salir del campo (onBlur) si quedó en 0.
  const setQtyManual = (codigo, value) => setCart(prev => {
    const cur = prev[codigo]; if (!cur) return prev;
    if (!/^\d*$/.test(value)) return prev; // solo dígitos
    return { ...prev, [codigo]: { ...cur, cajas: value } };
  });
  const onQtyBlur = (codigo) => setCart(prev => {
    const cur = prev[codigo]; if (!cur) return prev;
    let n = parseInt(cur.cajas) || 0;
    const max = maxCajasDe(cur.item);
    if (n > max) { notify(`Solo puedes pedir ${max} ${max === 1 ? "caja" : "cajas"} de "${cur.item.Descripcion}" (existencia: ${cur.item.Existencias} piezas)`); n = max; }
    if (n <= 0) { const c = { ...prev }; delete c[codigo]; return c; }
    return { ...prev, [codigo]: { ...cur, cajas: String(n) } };
  });
  const removeFromCart = (codigo) => setCart(prev => { const c = { ...prev }; delete c[codigo]; return c; });

  const cartList = Object.values(cart);
  const cartCajas = cartList.reduce((a, c) => a + cajasNum(c), 0);

  const enviarPedido = async () => {
    setSending(true);
    try {
      const res = await post({ action: "crearPedido", eco: tienda.ECO,
        items: cartList.map(c => ({
          Codigo: c.item.Codigo, Descripcion: c.item.Descripcion,
          NormaEmpaque: normaDe(c.item), Cajas: cajasNum(c), Cantidad: cajasNum(c) * normaDe(c.item),
        })) });
      notify(`Pedido enviado. Tu folio es ${res.folio}`);
      setCart({}); setStep("seleccion"); setConfirmando(false);
    } catch (e) { notify(e.message); } finally { setSending(false); }
  };

  if (step === "resumen") {
    return (
      <div>
        <div className="pcx-card">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <div className="pcx-h2" style={{ margin: 0 }}>Resumen de tu pedido</div>
            <span className="pcx-link" onClick={() => setStep("seleccion")}>← Seguir eligiendo</span>
          </div>
          <p className="pcx-muted">{cartCajas} {cartCajas === 1 ? "caja" : "cajas"} en total, {cartList.length} {cartList.length === 1 ? "artículo" : "artículos"}</p>
        </div>

        <div className="pcx-card">
          {cartList.map(c => (
            <div className="pcx-item-row" key={c.item.Codigo}>
              <div>
                <div className="pcx-item-name">{c.item.Descripcion}</div>
                <div className="pcx-item-meta">{cajasNum(c)} {cajasNum(c) === 1 ? "caja" : "cajas"} × {normaDe(c.item)} pzas = {cajasNum(c) * normaDe(c.item)} piezas</div>
              </div>
              <button className="pcx-btn pcx-btn-danger" onClick={() => removeFromCart(c.item.Codigo)}>🗑️</button>
            </div>
          ))}
        </div>

        <button className="pcx-btn pcx-btn-accent pcx-btn-block" onClick={() => setConfirmando(true)} disabled={cartList.length === 0}>
          Enviar pedido
        </button>

        {confirmando && (
          <div className="pcx-card" style={{ borderColor: "var(--accent)", background: "#FFF8EF", marginTop: 12 }}>
            <div style={{ fontWeight: 800, fontSize: 14.5, marginBottom: 6 }}>📦 Recuerda: tu pedido está capturado en cajas, no en piezas</div>
            <p className="pcx-muted" style={{ marginBottom: 12 }}>Revisa que las cantidades de arriba sean correctas. ¿Confirmas que quieres enviar este pedido?</p>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="pcx-btn pcx-btn-primary" onClick={enviarPedido} disabled={sending}>
                {sending ? "Enviando..." : "Sí, enviar pedido"}
              </button>
              <button className="pcx-btn pcx-btn-ghost" onClick={() => setConfirmando(false)} disabled={sending}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div className="pcx-search-row"><span>🔍</span>
        <input className="pcx-input" placeholder="Buscar por código o descripción..." value={q} onChange={(e) => setQ(e.target.value)} />
      </div>
      <div className="pcx-card" style={{ maxHeight: "68vh", minHeight: 320, overflowY: "auto" }}>
        {loading && <div className="pcx-empty">Cargando existencias...</div>}
        {!loading && filtered.length === 0 && <div className="pcx-empty">Sin resultados</div>}
        {!loading && filtered.slice(0, 200).map((it) => (
          <div className="pcx-item-row" key={it.Codigo}>
            <div style={{ minWidth: 0 }}>
              <div className="pcx-item-name">{it.Descripcion}</div>
              <div className="pcx-item-meta">
                Código {it.Codigo} · Norma de empaque: {normaDe(it)} pzas/caja · Disponible: {it.Existencias} {it.Unidad || ""}
              </div>
            </div>
            {cart[it.Codigo] ? (
              <div className="pcx-qtybox">
                <button onClick={() => changeQty(it.Codigo, -1)}>−</button>
                <input type="text" inputMode="numeric" value={cart[it.Codigo].cajas}
                  onChange={(e) => setQtyManual(it.Codigo, e.target.value)}
                  onBlur={() => onQtyBlur(it.Codigo)}
                  style={{ width: 52, textAlign: "center", border: "1.5px solid var(--border)", borderRadius: 8, padding: "4px 2px", fontWeight: 700, fontSize: 13.5 }} />
                <button onClick={() => changeQty(it.Codigo, 1)}>+</button>
              </div>
            ) : <button className="pcx-btn pcx-btn-ghost" onClick={() => addToCart(it)}>+ Agregar</button>}
          </div>
        ))}
      </div>
      {cartCajas > 0 && (
        <div className="pcx-card" style={{ borderColor: "var(--accent)", position: "sticky", bottom: 12 }}>
          <div className="pcx-h2">Tu pedido ({cartCajas} {cartCajas === 1 ? "caja" : "cajas"})</div>
          <button className="pcx-btn pcx-btn-accent pcx-btn-block" onClick={() => setStep("resumen")}>
            Terminar pedido
          </button>
        </div>
      )}
    </div>
  );
}

function MisPedidosTab({ tienda, call, notify }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try { setRows(await call({ action: "getPedidosByEco", eco: tienda.ECO })); }
    catch (e) { notify(e.message); } finally { setLoading(false); }
  }, [call, notify, tienda.ECO]);

  useEffect(() => { load(); }, [load]);

  const folios = useMemo(() => {
    const map = {};
    rows.forEach(r => {
      if (!map[r.Folio]) map[r.Folio] = { folio: r.Folio, fecha: r.Fecha_Solicitud, estatus: r.Estatus, comentario: "", items: [] };
      map[r.Folio].items.push(r); map[r.Folio].estatus = r.Estatus;
      if (r.Comentario_Admin) map[r.Folio].comentario = r.Comentario_Admin;
    });
    return Object.values(map).sort((a, b) => (a.folio < b.folio ? 1 : -1));
  }, [rows]);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
        <button className="pcx-btn pcx-btn-ghost" onClick={load}>🔄 Actualizar</button>
      </div>
      {loading && <div className="pcx-empty">Cargando pedidos...</div>}
      {!loading && folios.length === 0 && <div className="pcx-empty">Aún no tienes pedidos registrados</div>}
      {!loading && folios.map(f => (
        <div className="pcx-folio-card" key={f.folio}>
          <div className="pcx-folio-head"><div className="pcx-folio-id">{f.folio}</div><StatusBadge estatus={f.estatus} /></div>
          <div className="pcx-muted" style={{ marginBottom: 6 }}>{f.fecha}</div>
          {f.comentario && (
            <div style={{ background: "#FFF8EF", border: "1px solid #F2D9B8", borderRadius: 8, padding: "8px 10px", marginBottom: 8, fontSize: 12.5 }}>
              💬 <strong>Mensaje del administrador:</strong> {f.comentario}
            </div>
          )}
          {f.items.map((it, idx) => (
            <div key={idx} style={{ fontSize: 13, padding: "4px 0", borderTop: idx === 0 ? "none" : "1px dashed var(--border)" }}>
              {it.Descripcion} — {it.Cajas_Solicitadas} {Number(it.Cajas_Solicitadas) === 1 ? "caja" : "cajas"} ({it.Cantidad_Solicitada} pzas)
              {it.Cajas_Confirmadas !== "" && it.Cajas_Confirmadas !== undefined && Number(it.Cajas_Confirmadas) !== Number(it.Cajas_Solicitadas)
                ? ` — confirmado: ${it.Cajas_Confirmadas} cajas (${it.Cantidad_Confirmada} pzas)` : ""}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

/* ============= ADMIN ============= */

function AdminFlow({ call, post, notify, onExit }) {
  const [tab, setTab] = useState("resumen");
  return (
    <div>
      <div className="pcx-tabs">
        <div className={`pcx-tab ${tab === "resumen" ? "active" : ""}`} onClick={() => setTab("resumen")}>Resumen</div>
        <div className={`pcx-tab ${tab === "pedidos" ? "active" : ""}`} onClick={() => setTab("pedidos")}>Pedidos</div>
        <div className={`pcx-tab ${tab === "existencias" ? "active" : ""}`} onClick={() => setTab("existencias")}>Existencias</div>
      </div>
      {tab === "resumen" && <ResumenTab call={call} notify={notify} />}
      {tab === "pedidos" && <PedidosAdminTab call={call} post={post} notify={notify} />}
      {tab === "existencias" && <ExistenciasAdminTab call={call} post={post} notify={notify} />}
    </div>
  );
}

function ResumenTab({ call, notify }) {
  const [resumen, setResumen] = useState([]);
  const [pedidos, setPedidos] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [r, p] = await Promise.all([call({ action: "getResumenPorTienda" }), call({ action: "getPedidosAdmin" })]);
      setResumen(r); setPedidos(p);
    } catch (e) { notify(e.message); } finally { setLoading(false); }
  }, [call, notify]);

  useEffect(() => { load(); }, [load]);

  const totalFolios = new Set(pedidos.map(p => p.Folio)).size;
  const totalPendientes = new Set(pedidos.filter(p => p.Estatus === "Pendiente").map(p => p.Folio)).size;

  const chartData = useMemo(() =>
    [...resumen].sort((a, b) => b.TotalArticulosSolicitados - a.TotalArticulosSolicitados).slice(0, 10),
    [resumen]);
  const maxVal = Math.max(1, ...chartData.map(r => r.TotalArticulosSolicitados));

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const wsResumen = XLSX.utils.json_to_sheet(resumen.map(r => ({
      ECO: r.ECO, Tienda: r.Tienda, Region: r.Region, Zona: r.Zona,
      "Folios totales": r.TotalFolios, "Folios pendientes": r.FoliosPendientes, "Artículos solicitados": r.TotalArticulosSolicitados,
    })));
    XLSX.utils.book_append_sheet(wb, wsResumen, "Resumen por tienda");
    const wsDetalle = XLSX.utils.json_to_sheet(pedidos.map(p => ({
      Folio: p.Folio, Fecha: p.Fecha_Solicitud, ECO: p.ECO, Tienda: p.Tienda, Region: p.Region, Zona: p.Zona,
      Codigo: p.Codigo_Articulo, Descripcion: p.Descripcion, "Norma empaque": p.Norma_Empaque,
      "Cajas solicitadas": p.Cajas_Solicitadas, "Piezas solicitadas": p.Cantidad_Solicitada,
      "Cajas confirmadas": p.Cajas_Confirmadas, "Piezas confirmadas": p.Cantidad_Confirmada,
      Estatus: p.Estatus, "Fecha estatus": p.Fecha_Estatus, Comentario: p.Comentario_Admin,
    })));
    XLSX.utils.book_append_sheet(wb, wsDetalle, "Detalle de pedidos");
    XLSX.writeFile(wb, `Resumen_Pedidos_CEDIS_${new Date().toISOString().slice(0,10)}.xlsx`);
    notify("Excel exportado");
  };

  return (
    <div>
      <div className="pcx-grid-2" style={{ marginBottom: 12 }}>
        <div className="pcx-stat"><div className="pcx-stat-num">{totalFolios}</div><div className="pcx-stat-label">Folios totales</div></div>
        <div className="pcx-stat"><div className="pcx-stat-num">{totalPendientes}</div><div className="pcx-stat-label">Folios pendientes</div></div>
      </div>
      <div className="pcx-card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
          <div className="pcx-h2" style={{ margin: 0 }}>📊 Top tiendas por artículos solicitados</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="pcx-btn pcx-btn-ghost" onClick={load}>🔄</button>
            <button className="pcx-btn pcx-btn-primary" onClick={exportExcel} disabled={resumen.length === 0}>⬇️ Exportar Excel</button>
          </div>
        </div>
        {loading && <div className="pcx-empty">Cargando...</div>}
        {!loading && chartData.length > 0 && (
          <div className="pcx-bars">
            {chartData.map(r => (
              <div className="pcx-bar-col" key={r.ECO}>
                <div className="pcx-bar-val">{r.TotalArticulosSolicitados}</div>
                <div className="pcx-bar" style={{ height: `${(r.TotalArticulosSolicitados / maxVal) * 160}px` }}></div>
                <div className="pcx-bar-lbl">{r.Tienda}</div>
              </div>
            ))}
          </div>
        )}
        {!loading && chartData.length === 0 && <div className="pcx-empty">Aún no hay pedidos registrados</div>}
      </div>
      <div className="pcx-card">
        <div className="pcx-h2">Detalle por tienda</div>
        <div className="pcx-table-wrap">
          <table className="pcx-table">
            <thead><tr><th>ECO</th><th>Tienda</th><th>Zona</th><th>Folios</th><th>Pendientes</th><th>Artículos</th></tr></thead>
            <tbody>{resumen.map(r => (
              <tr key={r.ECO}><td>{r.ECO}</td><td>{r.Tienda}</td><td>{r.Zona}</td><td>{r.TotalFolios}</td><td>{r.FoliosPendientes}</td><td>{r.TotalArticulosSolicitados}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function PedidosAdminTab({ call, post, notify }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filterEstatus, setFilterEstatus] = useState("Todos");
  const [q, setQ] = useState("");

  const load = useCallback(async () => {
    setLoading(true);
    try { setRows(await call({ action: "getPedidosAdmin" })); }
    catch (e) { notify(e.message); } finally { setLoading(false); }
  }, [call, notify]);

  useEffect(() => { load(); }, [load]);

  const folios = useMemo(() => {
    const map = {};
    rows.forEach(r => {
      if (!map[r.Folio]) map[r.Folio] = { folio: r.Folio, fecha: r.Fecha_Solicitud, eco: r.ECO, tienda: r.Tienda, zona: r.Zona, estatus: r.Estatus, items: [] };
      map[r.Folio].items.push(r); map[r.Folio].estatus = r.Estatus;
    });
    let list = Object.values(map).sort((a, b) => (a.folio < b.folio ? 1 : -1));
    if (filterEstatus !== "Todos") list = list.filter(f => f.estatus === filterEstatus);
    if (q.trim()) { const s = q.trim().toLowerCase(); list = list.filter(f => f.folio.toLowerCase().includes(s) || f.tienda.toLowerCase().includes(s) || String(f.eco).includes(s)); }
    return list;
  }, [rows, filterEstatus, q]);

  return (
    <div>
      <div className="pcx-card">
        <div className="pcx-grid-2">
          <div className="pcx-search-row" style={{ margin: 0 }}><span>🔍</span>
            <input className="pcx-input" placeholder="Buscar folio, tienda o ECO..." value={q} onChange={(e) => setQ(e.target.value)} />
          </div>
          <select className="pcx-select" value={filterEstatus} onChange={(e) => setFilterEstatus(e.target.value)}>
            <option>Todos</option>{ESTATUS.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
        <button className="pcx-btn pcx-btn-ghost" onClick={load}>🔄 Actualizar</button>
      </div>
      {loading && <div className="pcx-empty">Cargando pedidos...</div>}
      {!loading && folios.length === 0 && <div className="pcx-empty">No hay pedidos que coincidan</div>}
      {!loading && folios.map(f => <FolioAdminCard key={f.folio} folio={f} post={post} notify={notify} onSaved={load} />)}
    </div>
  );
}

function FolioAdminCard({ folio, post, notify, onSaved }) {
  const [open, setOpen] = useState(false);
  const [estatus, setEstatus] = useState(folio.estatus);
  const [comentario, setComentario] = useState("");
  const [cajasConf, setCajasConf] = useState(() => {
    const o = {}; folio.items.forEach(it => { o[it.Codigo_Articulo] = it.Cajas_Confirmadas || it.Cajas_Solicitadas || 0; }); return o;
  });
  const [saving, setSaving] = useState(false);

  const guardar = async () => {
    setSaving(true);
    try {
      const cantidadesConfirmadas = {};
      folio.items.forEach(it => {
        const norma = Number(it.Norma_Empaque) || 1;
        const cajas = Number(cajasConf[it.Codigo_Articulo]) || 0;
        cantidadesConfirmadas[it.Codigo_Articulo] = { Cajas: cajas, Piezas: cajas * norma };
      });
      await post({ action: "actualizarEstatus", folio: folio.folio, estatus, comentario, cantidadesConfirmadas });
      notify(`Folio ${folio.folio} actualizado a "${estatus}"`);
      onSaved();
    } catch (e) { notify(e.message); } finally { setSaving(false); }
  };

  return (
    <div className="pcx-folio-card">
      <div className="pcx-folio-head" onClick={() => setOpen(!open)}>
        <div><div className="pcx-folio-id">{folio.folio} · {folio.tienda}</div><div className="pcx-muted">ECO {folio.eco} · {folio.zona} · {folio.fecha}</div></div>
        <StatusBadge estatus={folio.estatus} />
      </div>
      {open && (
        <div style={{ marginTop: 10 }}>
          <div className="pcx-table-wrap" style={{ marginBottom: 10 }}>
            <table className="pcx-table">
              <thead><tr><th>Código</th><th>Descripción</th><th>Norma</th><th>Cajas sol.</th><th>Piezas sol.</th><th>Cajas a confirmar</th></tr></thead>
              <tbody>{folio.items.map((it, idx) => {
                const norma = Number(it.Norma_Empaque) || 1;
                const cajas = Number(cajasConf[it.Codigo_Articulo]) || 0;
                return (
                  <tr key={idx}>
                    <td>{it.Codigo_Articulo}</td><td>{it.Descripcion}</td><td>{norma}</td>
                    <td>{it.Cajas_Solicitadas}</td><td>{it.Cantidad_Solicitada}</td>
                    <td style={{ width: 120 }}>
                      <input className="pcx-input" type="number" min="0" style={{ padding: "6px 8px" }}
                        value={cajasConf[it.Codigo_Articulo]}
                        onChange={(e) => setCajasConf(prev => ({ ...prev, [it.Codigo_Articulo]: e.target.value }))} />
                      <div className="pcx-muted" style={{ fontSize: 11, marginTop: 2 }}>{cajas * norma} pzas</div>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
          <div className="pcx-grid-2" style={{ marginBottom: 10 }}>
            <select className="pcx-select" value={estatus} onChange={(e) => setEstatus(e.target.value)}>{ESTATUS.map(s => <option key={s}>{s}</option>)}</select>
            <input className="pcx-input" placeholder="Comentario (opcional)" value={comentario} onChange={(e) => setComentario(e.target.value)} />
          </div>
          <button className="pcx-btn pcx-btn-primary" onClick={guardar} disabled={saving}>{saving ? "Guardando..." : "Guardar cambios"}</button>
        </div>
      )}
    </div>
  );
}

function ExistenciasAdminTab({ call, post, notify }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [q, setQ] = useState("");
  const [uploading, setUploading] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try { setItems(await call({ action: "getExistencias" })); }
    catch (e) { notify(e.message); } finally { setLoading(false); }
  }, [call, notify]);

  useEffect(() => { load(); }, [load]);

  const filtered = useMemo(() => {
    if (!q.trim()) return items;
    const s = q.trim().toLowerCase();
    return items.filter(it => String(it.Codigo).toLowerCase().includes(s) || String(it.Descripcion).toLowerCase().includes(s));
  }, [items, q]);

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const wsName = wb.SheetNames.find(n => n.toLowerCase().includes("existenc")) || wb.SheetNames[0];
      const raw = XLSX.utils.sheet_to_json(wb.Sheets[wsName], { defval: "" });
      const mapped = raw.map(r => {
        const get = (...keys) => { for (const k of keys) { if (r[k] !== undefined && r[k] !== "") return r[k]; } return ""; };
        return {
          Cedis: get("Cedis"),
          Codigo: get("ID Artículo", "ID Articulo", "Codigo", "Código"),
          Descripcion: get("Nombre artículo", "Nombre articulo", "Descripcion", "Descripción"),
          Estatus: get("Estatus"),
          Tipo: get("Tipo artículo", "Tipo articulo"),
          Existencias: get("Existencias"),
          Unidad: get("Unidad de medida", "Unidad"),
          Norma_Empaque: get("Norma de empaque", "Norma_Empaque"),
          Costo: get("Costo"),
          Zona_CEDIS: get("Zona", "Zona_CEDIS"),
          Ubicacion: get("Ubicación", "Ubicacion"),
        };
      }).filter(r => r.Codigo);
      if (mapped.length === 0) { notify("No se encontraron filas válidas en el archivo"); setUploading(false); return; }
      await post({ action: "cargarExistencias", items: mapped });
      notify(`Existencias actualizadas: ${mapped.length} artículos`);
      load();
    } catch (e) { notify("Error al procesar el archivo: " + e.message); }
    finally { setUploading(false); e.target.value = ""; }
  };

  return (
    <div>
      <div className="pcx-card">
        <div className="pcx-h2">Cargar nuevas existencias</div>
        <p className="pcx-muted" style={{ marginBottom: 10 }}>Sube tu archivo de existencias del CEDIS (.xlsx). Esto reemplaza todo el catálogo actual.</p>
        <label className="pcx-btn pcx-btn-accent" style={{ cursor: "pointer" }}>
          ⬆️ {uploading ? "Procesando..." : "Elegir archivo Excel"}
          <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display: "none" }} disabled={uploading} />
        </label>
      </div>
      <div className="pcx-search-row"><span>🔍</span>
        <input className="pcx-input" placeholder="Buscar por código o descripción..." value={q} onChange={(e) => setQ(e.target.value)} />
      </div>
      <div className="pcx-card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div className="pcx-h2" style={{ margin: 0 }}>Catálogo actual ({items.length})</div>
          <button className="pcx-btn pcx-btn-ghost" onClick={load}>🔄</button>
        </div>
        {loading && <div className="pcx-empty">Cargando...</div>}
        <div className="pcx-table-wrap" style={{ maxHeight: 420, overflowY: "auto" }}>
          <table className="pcx-table">
            <thead><tr><th>Código</th><th>Descripción</th><th>Estatus</th><th>Existencias</th><th>Norma</th><th>Ubicación</th></tr></thead>
            <tbody>{filtered.slice(0, 300).map((it, idx) => (
              <tr key={idx}><td>{it.Codigo}</td><td>{it.Descripcion}</td><td>{it.Estatus}</td><td>{it.Existencias}</td><td>{it.Norma_Empaque}</td><td>{it.Ubicacion}</td></tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
